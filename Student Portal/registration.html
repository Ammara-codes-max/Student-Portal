<input id="email" class="form-control my-2" placeholder="Email">

<input type="password" id="cpass" class="form-control my-2" placeholder="Confirm Password">
<input id="age" class="form-control my-2" placeholder="Age">

<select id="gender" class="form-control my-2">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>
